name: Lint & Test Charts

on:
  pull_request:
    paths:
      - "charts/**"
      - "ct.yaml"
      - ".github/workflows/lint-test.yml"
  push:
    branches:
      - main
    paths:
      - "charts/**"

# Gate releases on a green lint/test run.
permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install Helm unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Determine changed charts
        id: list-changed
        run: |
          changed="$(ct list-changed --config ct.yaml)"
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

      - name: Update chart dependencies
        run: |
          for chart in charts/web-service charts/worker; do
            helm dependency update "$chart"
          done

      - name: Run helm unittest
        run: |
          helm unittest charts/web-service charts/worker

      - name: Render manifests for kubeconform
        run: |
          mkdir -p rendered
          helm template ci-web charts/web-service \
            --values charts/web-service/ci/default-values.yaml > rendered/web-service.yaml
          helm template ci-worker charts/worker \
            --values charts/worker/ci/default-values.yaml > rendered/worker.yaml

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests with kubeconform
        run: |
          # CRDs (KEDA / External Secrets) are skipped since their schemas are not bundled.
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -schema-location default \
            rendered/

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
