name: Release Charts

# Publishes packaged charts to the gh-pages branch as a Helm repository.
# Triggered on pushes to main that change charts; chart-releaser only releases
# charts whose version in Chart.yaml has not been tagged yet.

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: write

jobs:
  release:
    # Re-run the lint/test gate's intent here would be ideal; in practice the
    # branch protection on main requires the Lint & Test workflow to pass before
    # a PR can merge, so a push to main is already validated.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Add chart repos for dependencies
        run: |
          # The library chart is pulled from local path; nothing external needed,
          # but this is where you would add upstream repos if charts depended on them.
          helm repo add bitnami https://charts.bitnami.com/bitnami || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          # Skip the library chart — library charts are not independently releasable.
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
