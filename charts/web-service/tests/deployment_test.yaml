suite: web-service deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders a Deployment with the fully-qualified name
    set:
      image.repository: ghcr.io/acme/web
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-web-service

  - it: builds the image string from registry/repository/tag
    set:
      image.registry: ghcr.io/acme
      image.repository: web
      image.tag: "1.4.2"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/acme/web:1.4.2

  - it: applies hardened container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: sets a static replica count when autoscaling is disabled
    set:
      autoscaling.enabled: false
      replicaCount: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 4
