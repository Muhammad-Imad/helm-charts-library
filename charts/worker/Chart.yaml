type: application
version: 1.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.25.0-0"
keywords:
  - worker
  - queue
  - async
  - keda
maintainers:
  - name: Muhammad Imad
home: https://github.com/acme/helm-charts-library
sources:
  - https://github.com/acme/helm-charts-library
dependencies:
  - name: common
    version: "0.3.x"
    repository: "file://../common"
