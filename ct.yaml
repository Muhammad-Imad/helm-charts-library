# chart-testing (ct) configuration.
# https://github.com/helm/chart-testing
target-branch: main
chart-dirs:
  - charts
# The `common` library chart is excluded from install testing because library
# charts render no objects and cannot be installed.
excluded-charts:
  - common
helm-extra-args: --timeout 600s
check-version-increment: true
validate-maintainers: false
chart-repos: []
